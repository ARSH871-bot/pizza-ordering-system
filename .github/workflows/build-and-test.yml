name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build & Run Tests with Coverage
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "PizzaOrderingSystemC#/WindowsFormsApplication3.sln"

      - name: Build solution (Debug)
        run: |
          msbuild "PizzaOrderingSystemC#/WindowsFormsApplication3.sln" `
            /p:Configuration=Debug `
            /nologo `
            /verbosity:minimal

      - name: Run tests with Coverlet coverage
        run: |
          $vstest = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe"
          if (-not (Test-Path $vstest)) {
            $vstest = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "vstest.console.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName)
          }
          & $vstest `
            "PizzaOrderingSystemC#/PizzaExpress.Tests/bin/Debug/PizzaExpress.Tests.dll" `
            /collect:"XPlat Code Coverage" `
            /settings:"PizzaOrderingSystemC#/coverlet.runsettings" `
            /logger:trx

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: "**/coverage.opencover.xml"
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/coverage.opencover.xml"
