name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build & Run 95 Unit Tests
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "PizzaOrderingSystemC#/WindowsFormsApplication3.sln"

      - name: Build solution (Debug)
        run: |
          msbuild "PizzaOrderingSystemC#/WindowsFormsApplication3.sln" `
            /p:Configuration=Debug `
            /nologo `
            /verbosity:minimal

      - name: Run unit tests with coverage
        run: |
          vstest.console.exe `
            "PizzaOrderingSystemC#/PizzaExpress.Tests/bin/Debug/PizzaExpress.Tests.dll" `
            /EnableCodeCoverage `
            /collect:"Code Coverage" `
            /logger:trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/*.coverage"
