name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "PizzaOrderingSystemC#/WindowsFormsApplication3.sln"

      - name: Build solution (Debug)
        run: |
          msbuild "PizzaOrderingSystemC#/WindowsFormsApplication3.sln" `
            /p:Configuration=Debug `
            /nologo `
            /verbosity:minimal

      - name: Run tests and collect coverage
        run: |
          $vstest = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" `
            -Recurse -Filter "vstest.console.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          & $vstest `
            "PizzaOrderingSystemC#/PizzaExpress.Tests/bin/Debug/PizzaExpress.Tests.dll" `
            /collect:"XPlat Code Coverage" `
            /settings:"PizzaOrderingSystemC#/coverlet.runsettings" `
            /logger:trx;LogFileName=results.trx

      - name: Parse coverage and write job summary
        shell: pwsh
        run: |
          # Find the OpenCover XML produced by Coverlet
          $xml = Get-ChildItem -Recurse -Filter "coverage.opencover.xml" |
                 Select-Object -First 1 -ExpandProperty FullName

          if (-not $xml) {
            Write-Warning "coverage.opencover.xml not found — skipping coverage summary."
            exit 0
          }

          [xml]$doc = Get-Content $xml

          # Sum all sequence points across all modules
          $total   = 0
          $covered = 0
          foreach ($sp in $doc.SelectNodes("//SequencePoint")) {
            $total++
            if ([int]$sp.vc -gt 0) { $covered++ }
          }

          $pct = if ($total -gt 0) { [math]::Round($covered / $total * 100, 1) } else { 0 }

          # Branch coverage
          $bTotal   = 0
          $bCovered = 0
          foreach ($bp in $doc.SelectNodes("//BranchPoint")) {
            $bTotal++
            if ([int]$bp.vc -gt 0) { $bCovered++ }
          }
          $bPct = if ($bTotal -gt 0) { [math]::Round($bCovered / $bTotal * 100, 1) } else { 0 }

          $threshold = 70
          $icon      = if ($pct -ge $threshold) { "✅" } else { "❌" }
          $status    = if ($pct -ge $threshold) { "PASSED" } else { "BELOW THRESHOLD" }

          # Write to GitHub Actions job summary
          $summary = @"
          ## 📊 Coverage Report

          | Metric | Value |
          |--------|-------|
          | Line coverage | $pct % |
          | Branch coverage | $bPct % |
          | Lines covered | $covered / $total |
          | Threshold | $threshold % |
          | Status | $icon $status |
          "@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          Write-Host "Line coverage: $pct%  Branch: $bPct%  ($covered/$total lines)"

          # Fail the build if below threshold
          if ($pct -lt $threshold) {
            Write-Error "Coverage $pct% is below the required threshold of $threshold%."
            exit 1
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/coverage.opencover.xml"
