name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build, Test, and Package Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.x"
          # .NET Framework 4.8 is pre-installed on windows-latest

      - name: Restore NuGet packages
        run: dotnet restore "WindowsFormsApplication3.sln"

      - name: Build solution (Debug)
        run: |
          dotnet build "WindowsFormsApplication3.sln" `
            --configuration Debug `
            --no-restore `
            --nologo `
            -warnaserror

      - name: Run tests
        shell: pwsh
        run: |
          .\scripts\Run-Tests.ps1 `
            -RepoRoot "$PWD" `
            -Configuration Debug `
            -ResultsDirectory "$PWD\TestResults" `
            -LogFileName "results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/*.trx"

      - name: Build solution (Release)
        run: |
          dotnet build "WindowsFormsApplication3.sln" `
            --configuration Release `
            --no-restore `
            --nologo `
            -warnaserror

      - name: Package portable release
        shell: pwsh
        run: |
          .\scripts\Package-PortableRelease.ps1 -RepoRoot "$PWD" -Configuration Release -OutputRoot "$PWD\artifacts"

      - name: Smoke test portable package
        shell: pwsh
        run: |
          $package = Get-ChildItem "$PWD\artifacts" -Filter "PizzaExpress-*-portable.zip" |
                     Select-Object -First 1 -ExpandProperty FullName
          if (-not $package) {
            throw "Portable package zip was not created."
          }

          .\scripts\Test-PortablePackage.ps1 -PackagePath $package -TimeoutSeconds 8

      - name: Upload portable package
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: portable-release
          path: "artifacts/PizzaExpress-*-portable.zip"
