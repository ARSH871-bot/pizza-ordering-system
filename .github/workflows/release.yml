name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Release and Publish Portable Package
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.x"

      - name: Restore NuGet packages
        run: dotnet restore "WindowsFormsApplication3.sln"

      - name: Build Release
        run: |
          dotnet build "WindowsFormsApplication3.sln" `
            --configuration Release `
            --no-restore `
            --nologo `
            -warnaserror

      - name: Run tests (must pass before release)
        shell: pwsh
        run: |
          .\scripts\Run-Tests.ps1 `
            -RepoRoot "$PWD" `
            -Configuration Release `
            -ResultsDirectory "$PWD\TestResults" `
            -LogFileName "release-tests.trx"

      - name: Package portable release
        shell: pwsh
        run: |
          .\scripts\Package-PortableRelease.ps1 -RepoRoot "$PWD" -Configuration Release -OutputRoot "$PWD\artifacts"

      - name: Smoke test portable package
        shell: pwsh
        run: |
          $package = Get-ChildItem "$PWD\artifacts" -Filter "PizzaExpress-*-portable.zip" |
                     Select-Object -First 1 -ExpandProperty FullName
          if (-not $package) {
            throw "Portable package zip was not created."
          }

          .\scripts\Test-PortablePackage.ps1 -PackagePath $package -TimeoutSeconds 8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PizzaExpress-*-portable.zip
            artifacts/PizzaExpress-*-portable.zip.sha256
          generate_release_notes: true
          body: |
            ## Pizza Express New Zealand ${{ github.ref_name }}

            ### Install
            1. Download `PizzaExpress-*-portable.zip` below and extract it anywhere.
            2. Run `WindowsFormsApplication3.exe` - no installer needed.
            3. Requires Windows 10/11 with .NET Framework 4.8 (pre-installed on Windows 11).

            ### Verify download integrity (optional)
            A `.sha256` sidecar file is published alongside the ZIP.  Compare with:
            ```powershell
            (Get-FileHash 'PizzaExpress-${{ github.ref_name }}-portable.zip' -Algorithm SHA256).Hash
            ```

            ### What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for full details.
