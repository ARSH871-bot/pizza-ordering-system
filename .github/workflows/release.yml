name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build Release & Publish to GitHub
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore NuGet packages
        run: dotnet restore "PizzaOrderingSystemC#/WindowsFormsApplication3.sln"

      - name: Build Release
        run: |
          dotnet build "PizzaOrderingSystemC#/WindowsFormsApplication3.sln" `
            --configuration Release `
            --no-restore `
            --nologo

      - name: Run tests (must pass before release)
        run: |
          dotnet test "PizzaOrderingSystemC#/PizzaExpress.Tests/PizzaExpress.Tests.csproj" `
            --configuration Release `
            --no-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PizzaOrderingSystemC#/WindowsFormsApplication3/bin/Release/net48/WindowsFormsApplication3.exe
          generate_release_notes: true
          body: |
            ## Pizza Express New Zealand ${{ github.ref_name }}

            ### Install
            Download `WindowsFormsApplication3.exe` below — requires Windows 10/11 with .NET Framework 4.8 (pre-installed).

            ### What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/PizzaOrderingSystemC%23/CHANGELOG.md) for full details.
